name: Deploy to zephyr110.github.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build static site
        run: pnpm run export
        env:
          NEXT_PUBLIC_SITE_URL: https://zephyr110.github.io
          NEXT_PUBLIC_GISCUS_REPO: ${{ vars.GISCUS_REPO || 'zephyr110/bitlog' }}
          NEXT_PUBLIC_GISCUS_REPO_ID: ${{ vars.GISCUS_REPO_ID || 'R_kgDOTcGjYg' }}
          NEXT_PUBLIC_GISCUS_CATEGORY: ${{ vars.GISCUS_CATEGORY || 'Announcements' }}
          NEXT_PUBLIC_GISCUS_CATEGORY_ID: ${{ vars.GISCUS_CATEGORY_ID || 'DIC_kwDOTcGjYs4DBcmw' }}

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          external_repository: zephyr110/zephyr110.github.io
          publish_branch: main
          publish_dir: ./out
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
