name: Deploy to zephyr110.github.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run export

      - name: Deploy to user pages
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cd out
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GH_PAT}@github.com/zephyr110/zephyr110.github.io.git" main:main
